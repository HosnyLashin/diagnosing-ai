services:
  - type: web
    name: diagnosing-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 120
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: DB_CONNECTION
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FROM_EMAIL
        sync: false
